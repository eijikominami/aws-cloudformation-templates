AWSTemplateFormatVersion: 2010-09-09
Description: aws-cloudformation-templates/security/logging is a solution for collecting multiple types of logs.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Organizations Configuration
        Parameters:
          - SecurityOUId
          - LogArchiveAccountId
          - AuditAccountId
      - Label:
          default: SIEM Configuration
        Parameters:
          - CentralizedLoggingFirehoseRoleArns
          - SIEM
          - SIEMEsLoaderServiceRoleArn
          - SIEMEmail
      - Label:
          default: Tag Configuration
        Parameters:
          - Environment
          - TagKey
          - TagValue

Parameters:
  AuditAccountId:
    Type: String
    AllowedPattern: .+
    Description: The id of the audit account [required]
  LogArchiveAccountId:
    Type: String
    AllowedPattern: .+       
    Description: The id of the log archive account [required]
  OrganizationId:
    Type: String
    Default: .+
    Description: The root id of AWS Organizations [required]
  SecurityOUId:
    Type: String
    AllowedPattern: .+  
    Description: The id of the security OU [required]
  SIEM:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Enable or disable SIEM environment [required]
  SIEMEsLoaderServiceRoleArn:
    Type: String
    Default: ''
    Description: The ARN of lambda function aes-siem-es-loader
  SIEMEmail:
    Type: String
    Default: ''
    Description:  The email as SNS topic, where Amazon OpenSearch Service will send alerts to [required]
  CentralizedLoggingFirehoseRoleArns:
    Type: CommaDelimitedList
    Default: ''
    Description: List of IAM Role ARNs in Source Accounts that can assume the Cross-Account Role
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - test
      - development
  TagKey:
    Type: String
    Default: createdby
    AllowedPattern: .+
  TagValue:
    Type: String
    Default: aws-cloudformation-templates
    AllowedPattern: .+

Conditions:
  CreateSIEMIntegrationWithControlTower: !And [ !Equals [ !Ref SIEM, ENABLED ], !Not [ !Equals [ !Ref SIEMEmail, ''] ], !Not [ !Equals [!Ref SIEMEsLoaderServiceRoleArn , ''] ] ]
  Development: !Equals [ !Ref Environment, development ]
  HasFirehoseRoles: !Not [ !Equals [ !Join [',', !Ref CentralizedLoggingFirehoseRoleArns], ''] ]

Resources:
  SIEMIntegrationWithControlTower:
    Condition: CreateSIEMIntegrationWithControlTower
    Type: AWS::CloudFormation::StackSet
    Properties:
      AutoDeployment: 
        Enabled: true
        RetainStacksOnAccountRemoval: false
      CallAs: DELEGATED_ADMIN
      Capabilities: 
        - CAPABILITY_NAMED_IAM
      Description: SIEM on Amazon OpenSearch Service Control Tower Integration
      ManagedExecution: 
        Active: false
      OperationPreferences: 
        ConcurrencyMode: STRICT_FAILURE_TOLERANCE
        FailureToleranceCount: 0
        MaxConcurrentCount: 1
        RegionConcurrencyType: SEQUENTIAL
      Parameters: 
        - ParameterKey: EsLoaderServiceRole
          ParameterValue: !Ref SIEMEsLoaderServiceRoleArn
      PermissionModel: SERVICE_MANAGED
      StackInstancesGroup: 
        - DeploymentTargets: 
            AccountFilterType: INTERSECTION
            Accounts: 
              - !Ref LogArchiveAccountId
            OrganizationalUnitIds: 
              - !Ref SecurityOUId
          Regions: 
            - !Ref AWS::Region
      StackSetName: SIEMIntegrationWithControlTower
      Tags: 
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue  
      TemplateURL: https://s3-ap-northeast-1.amazonaws.com/eijikominami-test/aws-cloudformation-templates/security/siem-integration-with-control-tower.template
  SecurityLake:
    Type: AWS::CloudFormation::StackSet
    Properties:
      AutoDeployment: 
        Enabled: true
        RetainStacksOnAccountRemoval: false
      CallAs: DELEGATED_ADMIN
      Capabilities: 
        - CAPABILITY_NAMED_IAM
      Description: Amazon Security Lake
      ManagedExecution: 
        Active: false
      OperationPreferences: 
        ConcurrencyMode: STRICT_FAILURE_TOLERANCE
        FailureToleranceCount: 0
        MaxConcurrentCount: 1
        RegionConcurrencyType: SEQUENTIAL
      Parameters: 
        - ParameterKey: AuditAccountId
          ParameterValue: !Ref AuditAccountId
        - ParameterKey: Environment
          ParameterValue: production
        - ParameterKey: LogicalName
          ParameterValue: SecurityLake
        - ParameterKey: TagKey
          ParameterValue: !Ref TagKey
        - ParameterKey: TagValue
          ParameterValue: !Ref TagValue
      PermissionModel: SERVICE_MANAGED
      StackInstancesGroup: 
        - DeploymentTargets: 
            AccountFilterType: INTERSECTION
            Accounts: 
              - !Ref LogArchiveAccountId
            OrganizationalUnitIds: 
              - !Ref SecurityOUId
          Regions: 
            - !Ref AWS::Region
      StackSetName: SecurityLake
      Tags: 
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue  
      TemplateURL: !If
        - Development
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami-test/aws-cloudformation-templates/security/securitylake.yaml
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami/aws-cloudformation-templates/security/securitylake.yaml
  CentralizedLogging:
    Type: AWS::CloudFormation::StackSet
    Properties:
      AutoDeployment: 
        Enabled: true
        RetainStacksOnAccountRemoval: false
      CallAs: DELEGATED_ADMIN
      Capabilities: 
        - CAPABILITY_NAMED_IAM
      Description: Environment for centralized logging
      ManagedExecution: 
        Active: false
      OperationPreferences: 
        ConcurrencyMode: STRICT_FAILURE_TOLERANCE
        FailureToleranceCount: 0
        MaxConcurrentCount: 1
        RegionConcurrencyType: SEQUENTIAL
      Parameters: 
        - ParameterKey: FirehoseRoleArns
          ParameterValue: !If
            - HasFirehoseRoles
            - !Join
              - ','
              - !Ref CentralizedLoggingFirehoseRoleArns
            - ''
        - ParameterKey: OrganizationId
          ParameterValue: !Ref OrganizationId
        - ParameterKey: Environment
          ParameterValue: !Ref Environment
        - ParameterKey: TagKey
          ParameterValue: !Ref TagKey
        - ParameterKey: TagValue
          ParameterValue: !Ref TagValue
      PermissionModel: SERVICE_MANAGED
      StackInstancesGroup: 
        - DeploymentTargets: 
            AccountFilterType: INTERSECTION
            Accounts: 
              - !Ref LogArchiveAccountId
            OrganizationalUnitIds: 
              - !Ref SecurityOUId
          Regions: 
            - !Ref AWS::Region
      StackSetName: CentralizedLogging
      Tags: 
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue  
      TemplateURL: !If
        - Development
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami-test/aws-cloudformation-templates/security/centralized-logging.yaml
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami/aws-cloudformation-templates/security/centralized-logging.yaml
