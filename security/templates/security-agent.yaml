AWSTemplateFormatVersion: 2010-09-09
Description: aws-cloudformation-templates/security/security-agent sets AWS Security Agent.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Security Agent Configuration'
        Parameters:
          - AgentSpaceName
          - VpcId
      - Label:
          default: 'Notification Configuration'
        Parameters:
          - SNSForAlertArn
          - SNSForDeploymentArn
      - Label:
          default: 'Tag Configuration'
        Parameters:
          - Environment
          - TagKey
          - TagValue

Parameters:
  AgentSpaceName:
    Type: String
    Default: security-agent-space
    AllowedPattern: .+
    Description: The name of the AWS Security Agent agent space [required]
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - test
      - development
  SNSForAlertArn:
    Type: String
    Default: ''
    Description: The Amazon SNS topic ARN for alert
  SNSForDeploymentArn:
    Type: String
    Default: ''
    Description: The Amazon SNS topic ARN for deployment information
  TagKey:
    Type: String
    Default: createdby
    AllowedPattern: .+
  TagValue:
    Type: String
    Default: aws-cloudformation-templates
    AllowedPattern: .+
  VpcId:
    Type: String
    Default: ''
    Description: The VPC in which Security Agent scanner runs (optional)

Conditions:
  CreateSecurityGroup: !Not [!Equals [!Ref VpcId, '']]
  CreateSNSForAlert: !Equals [!Ref SNSForAlertArn, '']
  CreateSNSForDeployment: !Equals [!Ref SNSForDeploymentArn, '']

Resources:
  # Nested Stack
  SNSForAlert:
    Condition: CreateSNSForAlert
    Type: AWS::Serverless::Application
    Properties:
      Location:
        ApplicationId: arn:aws:serverlessrepo:us-east-1:172664222583:applications/sns-topic
        SemanticVersion: 2.2.24
      NotificationARNs:
        - !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
      Parameters:
        TopicName: !Sub Alert-createdby-${AWS::StackName}
      Tags:
        environment: !Ref Environment
        createdby: !Ref TagValue

  SNSForDeployment:
    Condition: CreateSNSForDeployment
    Type: AWS::Serverless::Application
    Properties:
      Location:
        ApplicationId: arn:aws:serverlessrepo:us-east-1:172664222583:applications/sns-topic
        SemanticVersion: 2.2.24
      Parameters:
        TopicName: !Sub Deployment-createdby-${AWS::StackName}
      Tags:
        environment: !Ref Environment
        createdby: !Ref TagValue

  # IAM
  IAMRoleForSecurityAgentApp:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Sub operator-iam-${AWS::AccountId}
            Effect: Allow
            Principal:
              Service: securityagent.amazonaws.com
      Description: !Sub App role for AWS Security Agent in ${AWS::StackName}
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecurityAgentWebAppPolicy
        - arn:aws:iam::aws:policy/service-role/AWSSecurityAgentWebAppPolicy
        - arn:aws:iam::aws:policy/service-role/SecurityAgentWebAppAPIPolicy
      RoleName: !Sub securityagent-SecurityAgent-App-${AWS::Region}
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue

  IAMRoleForSecurityAgentService:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: securityagent.amazonaws.com
      Description: !Sub Service role for AWS Security Agent in ${AWS::StackName}
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      RoleName: !Sub securityagent-SecurityAgent-Service-${AWS::Region}
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue

  # EC2
  SecurityGroupForScanner:
    Condition: CreateSecurityGroup
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for AWS Security Agent scanner
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
          IpProtocol: '-1'
      Tags:
        - Key: Name
          Value: !Sub securityagent-security-agent-scanner
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
      VpcId: !Ref VpcId

  # Security Agent
  SecurityAgentApplication:
    DependsOn: IAMRoleForSecurityAgentApp
    Type: AWS::SecurityAgent::Application
    Properties:
      RoleArn: !GetAtt IAMRoleForSecurityAgentApp.Arn
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue

  SecurityAgentAgentSpace:
    DependsOn: SecurityAgentApplication
    Type: AWS::SecurityAgent::AgentSpace
    Properties:
      Description: AWS Security Agent agent space
      Name: !Ref AgentSpaceName
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue

Outputs:
  ApplicationId:
    Description: The AWS Security Agent Application ID
    Value: !GetAtt SecurityAgentApplication.ApplicationId
  AgentSpaceId:
    Description: The AWS Security Agent Agent Space ID
    Value: !Ref SecurityAgentAgentSpace
  ServiceRoleArn:
    Description: The IAM service role ARN for AWS Security Agent
    Value: !GetAtt IAMRoleForSecurityAgentService.Arn
  ScannerSecurityGroupId:
    Condition: CreateSecurityGroup
    Description: The security group ID for the Security Agent scanner
    Value: !GetAtt SecurityGroupForScanner.GroupId
