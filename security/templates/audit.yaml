AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: aws-cloudformation-templates/security/audit deploys resources directly into the Audit account (SIEM, GuardDuty notifications).

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'SIEM Configuration'
        Parameters:
          - SIEM
          - AllowedSourceIpAddressesForSIEM
          - SIEMControlTowerLogBucketNameList
          - SIEMControlTowerRoleArnForEsLoader
          - SIEMControlTowerSqsForLogBuckets
          - SIEMGeoLite2LicenseKey
          - SIEMSecurityLakeSubscriberSqs
          - SIEMSecurityLakeExternalId
          - SIEMSecurityLakeRoleArn
          - SIEMEmail
      - Label:
          default: 'GuardDuty Configuration'
        Parameters:
          - AmazonGuardDuty
          - AmazonGuardDutyFindingsDestinationBucketArn
          - AmazonGuardDutyKmsKeyArn
      - Label:
          default: 'Security Agent Configuration'
        Parameters:
          - SecurityAgent
          - SecurityAgentVpcId
      - Label:
          default: 'Notification Configuration'
        Parameters:
          - SNSForAlertArn
          - SNSForDeploymentArn
      - Label:
          default: 'Tag Configuration'
        Parameters:
          - Environment
          - TagKey
          - TagValue

Parameters:
  AllowedSourceIpAddressesForSIEM:
    Type: String
    Default: 0.0.0.0/0
    Description: Allowed source IP addresses for SIEM
  AmazonGuardDuty:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - NOTIFICATION_ONLY
      - DISABLED
    Description: ENABLED creates a detector. NOTIFICATION_ONLY assumes detector exists (e.g. via Organizations delegated admin) and only sets up EventBridge notifications. DISABLED skips GuardDuty entirely.
  AmazonGuardDutyFindingsDestinationBucketArn:
    Type: String
    Default: ''
    Description: S3 bucket ARN for GuardDuty findings export
  AmazonGuardDutyKmsKeyArn:
    Type: String
    Default: ''
    Description: KMS key ARN for GuardDuty findings encryption
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - test
      - development
  SIEM:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Enable or disable SIEM on Amazon OpenSearch Service
  SIEMControlTowerLogBucketNameList:
    Type: String
    Default: ''
  SIEMControlTowerRoleArnForEsLoader:
    Type: String
    Default: ''
  SIEMControlTowerSqsForLogBuckets:
    Type: String
    Default: ''
  SIEMEmail:
    Type: String
    Default: ''
  SIEMGeoLite2LicenseKey:
    Type: String
    Default: ''
    NoEcho: true
  SIEMSecurityLakeExternalId:
    Type: String
    Default: ''
  SIEMSecurityLakeRoleArn:
    Type: String
    Default: ''
  SIEMSecurityLakeSubscriberSqs:
    Type: String
    Default: ''
  SecurityAgent:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Enable or disable AWS Security Agent
  SecurityAgentVpcId:
    Type: String
    Default: ''
    Description: The VPC in which Security Agent scanner runs
  SNSForAlertArn:
    Type: String
    Default: ''
  SNSForDeploymentArn:
    Type: String
    Default: ''
  TagKey:
    Type: String
    Default: createdby
    AllowedPattern: .+
  TagValue:
    Type: String
    Default: aws-cloudformation-templates
    AllowedPattern: .+

Conditions:
  CreateSIEM: !Equals [ !Ref SIEM, ENABLED ]
  CreateGuardDuty: !Or [ !Equals [ !Ref AmazonGuardDuty, ENABLED], !Equals [!Ref AmazonGuardDuty, NOTIFICATION_ONLY ] ]
  CreateGuardDutyEventBridgeOnly: !Equals [ !Ref AmazonGuardDuty, NOTIFICATION_ONLY ]
  CreateSecurityAgent: !Equals [ !Ref SecurityAgent, ENABLED ]
  CreateSNSForAlert: !Equals [ !Ref SNSForAlertArn, '' ]
  CreateSNSForDeployment: !Equals [ !Ref SNSForDeploymentArn, '' ]
  Development: !Equals [ !Ref Environment, development ]

Resources:
  # SNS
  SNSForAlert:
    Condition: CreateSNSForAlert
    Type: AWS::Serverless::Application
    Properties:
      Location:
        ApplicationId: arn:aws:serverlessrepo:us-east-1:172664222583:applications/sns-topic
        SemanticVersion: 2.2.24
      Parameters:
        TopicName: !Sub Alert-createdby-${AWS::StackName}
      Tags:
        environment: !Ref Environment
        createdby: !Ref TagValue
  SNSForDeployment:
    Condition: CreateSNSForDeployment
    Type: AWS::Serverless::Application
    Properties:
      Location:
        ApplicationId: arn:aws:serverlessrepo:us-east-1:172664222583:applications/sns-topic
        SemanticVersion: 2.2.24
      Parameters:
        TopicName: !Sub Deployment-createdby-${AWS::StackName}
      Tags:
        environment: !Ref Environment
        createdby: !Ref TagValue
  # SIEM on Amazon OpenSearch Service
  SIEMOnAmazonOpenSearchService:
    Condition: CreateSIEM
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        AllowedSourceIpAddresses: !Ref AllowedSourceIpAddressesForSIEM
        ControlTowerLogBucketNameList: !Ref SIEMControlTowerLogBucketNameList
        ControlTowerRoleArnForEsLoader: !Ref SIEMControlTowerRoleArnForEsLoader
        ControlTowerSqsForLogBuckets: !Ref SIEMControlTowerSqsForLogBuckets
        DeploymentTarget: opensearch_serverless
        GeoLite2LicenseKey: !Ref SIEMGeoLite2LicenseKey
        SecurityLakeSubscriberSqs: !Ref SIEMSecurityLakeSubscriberSqs
        SecurityLakeExternalId: !Ref SIEMSecurityLakeExternalId
        SecurityLakeRoleArn: !Ref SIEMSecurityLakeRoleArn
        SnsEmail: !Ref SIEMEmail
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
      TemplateURL: https://aes-siem-ap-northeast-1.s3.amazonaws.com/siem-on-amazon-opensearch-service.template
  # Security Agent
  SecurityAgentSpace:
    Condition: CreateSecurityAgent
    Type: AWS::CloudFormation::Stack
    Properties:
      NotificationARNs:
        - !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
      Parameters:
        SNSForAlertArn: !If
          - CreateSNSForAlert
          - !GetAtt SNSForAlert.Outputs.SNSTopicArn
          - !Ref SNSForAlertArn
        SNSForDeploymentArn: !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
        VpcId: !Ref SecurityAgentVpcId
        Environment: !Ref Environment
        TagKey: !Ref TagKey
        TagValue: !Ref TagValue
      TemplateURL: !Sub
        - https://s3-ap-northeast-1.amazonaws.com/${BucketName}/aws-cloudformation-templates/security/security-agent.yaml
        - BucketName: !If
            - Development
            - eijikominami-test
            - eijikominami
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
  # GuardDuty
  GuardDuty:
    Condition: CreateGuardDuty
    Type: AWS::CloudFormation::Stack
    Properties:
      NotificationARNs:
        - !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
      Parameters:
        AlarmLevel: NOTICE
        Detector: !If
          - CreateGuardDutyEventBridgeOnly
          - DISABLED
          - ENABLED
        FindingsDestinationBucketArn: !Ref AmazonGuardDutyFindingsDestinationBucketArn
        KmsKeyArn: !Ref AmazonGuardDutyKmsKeyArn
        SNSForAlertArn: !If
          - CreateSNSForAlert
          - !GetAtt SNSForAlert.Outputs.SNSTopicArn
          - !Ref SNSForAlertArn
        SNSForDeploymentArn: !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
        LogicalName: !Ref AWS::StackName
        Environment: !Ref Environment
        TagKey: !Ref TagKey
        TagValue: !Ref TagValue
      TemplateURL: !Sub
        - https://s3-ap-northeast-1.amazonaws.com/${BucketName}/aws-cloudformation-templates/security/guardduty.yaml
        - BucketName: !If
            - Development
            - eijikominami-test
            - eijikominami
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
