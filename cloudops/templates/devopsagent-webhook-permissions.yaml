AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::LanguageExtensions
Description: aws-cloudformation-templates/cloudops/devopsagent-webhook-permissions creates cross-account Lambda Permissions for webhook forwarding.

Parameters:
  LambdaFunctionArn:
    Type: String
    Description: ARN of the WebhookForwarder Lambda function
  MemberAccountIds:
    Type: CommaDelimitedList
    Description: List of MEMBER account IDs to allow SNS invoke from

Resources:
  Fn::ForEach::LambdaPermissionForMember:
    - AccountId
    - !Ref MemberAccountIds
    - LambdaPermissionForWebhookForwarder${AccountId}:
        Type: AWS::Lambda::Permission
        Properties:
          Action: lambda:InvokeFunction
          FunctionName: !Ref LambdaFunctionArn
          Principal: sns.amazonaws.com
          SourceArn: !Sub arn:aws:sns:${AWS::Region}:${AccountId}:Alert-createdby-*
