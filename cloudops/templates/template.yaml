AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: aws-cloudformation-templates/cloudops sets basic configurations for CloudOps.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: CodeGuru Configuration
        Parameters:
          - CodeGuruTargetRepository
      - Label:
          default: 'DevOps Agent Configuration'
        Parameters:
          - DevOpsAgent
          - DevOpsAgentMemberAccountIds
      - Label:
          default: 'Resource Explorer Configuration'
        Parameters:
          - ResourceExplorerIndexType
      - Label:
          default: Systems Manager Configuration
        Parameters:
          - SSMAdminAccountId
          - SSMIgnoreResourceConflicts
          - SSMOrganizationId
          - SSMPatchingAt
      - Label:
          default: CloudWatch Application Insight Configuration
        Parameters:
          - ApplicationInsights
      - Label:
          default: Notofication Configuration
        Parameters:
          - AlarmLevel
          - SNSForAlertArn
          - SNSForDeploymentArn
      - Label:
          default: Tag Configuration
        Parameters:
          - Environment
          - TagKey
          - TagValue

Parameters:
  AlarmLevel:
    Type: String
    Default: NOTICE
    AllowedValues:
      - NOTICE
      - WARNING
    Description: The alarm level of CloudWatch alarms
  ApplicationInsights:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Enable or disable Amazon CloudWatch Application Insights [required]
  CodeGuruTargetRepository:
    Type: String
    Default: ''
    Description: The GitHub owner name and repository name for AWS CodeGuru Reviewer [required]
  DevOpsAgent:
    Type: String
    Default: MEMBER
    AllowedValues:
      - PRIMARY
      - MEMBER
      - DISABLED
    Description: PRIMARY creates AgentSpace and Aggregator Index. MEMBER creates IAM roles only. DISABLED skips entirely.
  DevOpsAgentMemberAccountIds:
    Type: CommaDelimitedList
    Default: ''
    Description: Comma-separated list of MEMBER account IDs for cross-account webhook forwarding (for PRIMARY mode)
  DevOpsAgentPrimaryAccountId:
    Type: String
    Default: ''
    Description: Account ID of the PRIMARY account (for MEMBER mode)
  DevOpsAgentSpaceId:
    Type: String
    Default: ''
    Description: AgentSpace ID from the PRIMARY account (for MEMBER mode)
  ResourceExplorerIndexType:
    Type: String
    Default: LOCAL
    AllowedValues:
      - AGGREGATOR
      - LOCAL
    Description: Resource Explorer index type. Only one AGGREGATOR per Organization.
  SSMAdminAccountId:
    Type: String
    Default: ''
    Description: AWS Account ID of the primary account (the account from which AWS Systems Manager Automation will be initiated)
  SSMIgnoreResourceConflicts:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
  SSMOrganizationId:
    Type: String
    Default: ''
    Description: The Organizations ID
  SSMOrganizationsRootId:
    Type: String
    Default: ''
    Description: The Organizations Root ID (e.g. r-xxxx)
  SSMPatchingAt:
    Type: Number
    Default: 3
    MinValue: 0
    MaxValue: 23
    Description: Daily patching time (H) [required]
  SNSForAlertArn:
    Type: String
    Default: ''
    Description: The Amazon SNS topic ARN for alert
  SNSForDeploymentArn:
    Type: String
    Default: ''
    Description: The Amazon SNS topic ARN for deployment information
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - test
      - development
  TagKey:
    Type: String
    Default: createdby
    AllowedPattern: .+
  TagValue:
    Type: String
    Default: aws-cloudformation-templates
    AllowedPattern: .+

Conditions:
  CreateApplicationInsights: !Equals
    - !Ref ApplicationInsights
    - ENABLED
  CreateCodeGuru: !Not
    - !Equals 
      - !Ref CodeGuruTargetRepository
      - ''
  CreateDevOpsAgent: !Not
    - !Equals [ !Ref DevOpsAgent, DISABLED ]
  CreateSNSForAlert: !Equals
    - !Ref SNSForAlertArn
    - ''
  CreateSNSForDeployment: !Equals
    - !Ref SNSForDeploymentArn
    - ''
  Development: !Equals
    - !Ref Environment
    - development

Resources:
  CloudWatchApplicationInsights:
    Condition: CreateApplicationInsights
    Type: AWS::CloudFormation::Stack
    Properties:
      NotificationARNs:
        - !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
      Parameters:
        SNSForAlertArn: !If
          - CreateSNSForAlert
          - !GetAtt SNSForAlert.Outputs.SNSTopicArn
          - !Ref SNSForAlertArn
        Environment: !Ref Environment
        TagKey: !Ref TagKey
        TagValue: !Ref TagValue
      TemplateURL: !If
        - Development
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami-test/aws-cloudformation-templates/cloudops/applicationinsights.yaml
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami/aws-cloudformation-templates/cloudops/applicationinsights.yaml
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
  CodeGuru:
    Condition: CreateCodeGuru
    Type: AWS::CloudFormation::Stack
    Properties:
      NotificationARNs:
        - !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
      Parameters:
        CodeGuruTargetRepository: !Ref CodeGuruTargetRepository
        Environment: !Ref Environment
        TagKey: !Ref TagKey
        TagValue: !Ref TagValue
      TemplateURL: !If
        - Development
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami-test/aws-cloudformation-templates/cloudops/codeguru.yaml
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami/aws-cloudformation-templates/cloudops/codeguru.yaml
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
  DevOpsAgentSpace:
    Condition: CreateDevOpsAgent
    Type: AWS::CloudFormation::Stack
    Properties:
      NotificationARNs:
        - !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
      Parameters:
        MemberAccountIds: !Join [ ',', !Ref DevOpsAgentMemberAccountIds ]
        Mode: !Ref DevOpsAgent
        PrimaryAccountId: !Ref DevOpsAgentPrimaryAccountId
        AgentSpaceId: !Ref DevOpsAgentSpaceId
        SNSForAlertArn: !If
          - CreateSNSForAlert
          - !GetAtt SNSForAlert.Outputs.SNSTopicArn
          - !Ref SNSForAlertArn
        Environment: !Ref Environment
        TagKey: !Ref TagKey
        TagValue: !Ref TagValue
      TemplateURL: !If
        - Development
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami-test/aws-cloudformation-templates/cloudops/devopsagent.yaml
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami/aws-cloudformation-templates/cloudops/devopsagent.yaml
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
  DevOpsGuru:
    Type: AWS::CloudFormation::Stack
    Properties:
      NotificationARNs:
        - !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
      Parameters:
        SNSForAlertArn: !If
          - CreateSNSForAlert
          - !GetAtt SNSForAlert.Outputs.SNSTopicArn
          - !Ref SNSForAlertArn
      TemplateURL: !If
        - Development
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami-test/aws-cloudformation-templates/cloudops/devopsguru.yaml
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami/aws-cloudformation-templates/cloudops/devopsguru.yaml
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
  ResourceExplorer:
    Type: AWS::CloudFormation::Stack
    Properties:
      NotificationARNs:
        - !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
      Parameters:
        IndexType: !Ref ResourceExplorerIndexType
        TagKey: !Ref TagKey
        TagValue: !Ref TagValue
      TemplateURL: !If
        - Development
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami-test/aws-cloudformation-templates/cloudops/resourceexplorer.yaml
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami/aws-cloudformation-templates/cloudops/resourceexplorer.yaml
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
  SystemsManager:
    Type: AWS::CloudFormation::Stack
    Properties:
      NotificationARNs:
        - !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
      Parameters:
        AlarmLevel: !Ref AlarmLevel
        AdminAccountId: !Ref SSMAdminAccountId
        IgnoreResourceConflicts: !Ref SSMIgnoreResourceConflicts
        OrganizationId: !Ref SSMOrganizationId
        OrganizationsRootId: !Ref SSMOrganizationsRootId
        PatchingAt: !Ref SSMPatchingAt
        LogicalName: !Ref AWS::StackName
        SNSForAlertArn: !If
          - CreateSNSForAlert
          - !GetAtt SNSForAlert.Outputs.SNSTopicArn
          - !Ref SNSForAlertArn
        SNSForDeploymentArn: !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
        Environment: !Ref Environment
        TagKey: !Ref TagKey
        TagValue: !Ref TagValue
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
      TemplateURL: !If
        - Development
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami-test/aws-cloudformation-templates/cloudops/ssm.yaml
        - https://s3-ap-northeast-1.amazonaws.com/eijikominami/aws-cloudformation-templates/cloudops/ssm.yaml
  SNSForAlert:
    Condition: CreateSNSForAlert
    Type: AWS::Serverless::Application
    Properties:
      Location:
        ApplicationId: arn:aws:serverlessrepo:us-east-1:172664222583:applications/sns-topic
        SemanticVersion: 2.2.24
      NotificationARNs:
        - !If
          - CreateSNSForDeployment
          - !GetAtt SNSForDeployment.Outputs.SNSTopicArn
          - !Ref SNSForDeploymentArn
      Parameters:
        TopicName: !Sub Alert-createdby-${AWS::StackName}
      Tags:
        environment: !Ref Environment
        createdby: !Ref TagValue
  SNSForDeployment:
    Condition: CreateSNSForDeployment
    Type: AWS::Serverless::Application
    Properties:
      Location:
        ApplicationId: arn:aws:serverlessrepo:us-east-1:172664222583:applications/sns-topic
        SemanticVersion: 2.2.24
      Parameters:
        TopicName: !Sub Deployment-createdby-${AWS::StackName}
      Tags:
        environment: !Ref Environment
        createdby: !Ref TagValue
  # Resource Group
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Description: !Sub Group by ${TagKey} ${TagValue}
      Name: !Sub ${TagKey}-${TagValue}
      ResourceQuery:
        Query:
          TagFilters:
            - Key: !Ref TagKey
              Values:
                - !Ref TagValue
        Type: TAG_FILTERS_1_0
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue