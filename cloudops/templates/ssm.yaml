  S3BucketForDiagnosis:
    Condition: CreateResource
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ssm-diagnosis-${AWS::AccountId}-${AWS::Region}
      Tags:
        - Key: environment
          Value: !Ref Environment
        - Key: !Ref TagKey
          Value: !Ref TagValue
  # Quick Setup Configuration Managers (delegated admin only)
  SSMQuickSetupForUnifiedConsole:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            AgentUpdateSchedule: rate(14 days)
            DelegatedAccountId: !Ref AdminAccountId
            EnableDHMCSchedule: rate(1 day)
            HomeRegion: !Ref AWS::Region
            InventoryCollectionSchedule: rate(12 hours)
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-SSM
          TypeVersion: '3.0'
      Description: !Sub SSM Unified Console created by ${LogicalName}
      Name: SSMUnifiedConsole
  # Quick Setup - Patch Policy
  SSMQuickSetupForPatchPolicy:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            ConfigurationOptionsPatchOperation: ScanAndInstall
            ConfigurationOptionsScanValue: cron(0 1 * * ? *)
            ConfigurationOptionsInstallValue: cron(0 3 ? * SAT *)
            ConfigurationOptionsScanNextInterval: 'false'
            ConfigurationOptionsInstallNextInterval: 'true'
            PatchPolicyName: !Sub ${LogicalName}-PatchPolicy
            PatchBaselineUseDefault: default
            RebootOption: RebootIfNeeded
            IsPolicyAttachAllowed: 'true'
            OutputLogEnableS3: 'false'
            RateControlConcurrency: '10'
            RateControlErrorThreshold: '2%'
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
            TargetType: '*'
          Type: AWSQuickSetupType-PatchPolicy
      Description: !Sub Patch Policy created by ${LogicalName}
      Name: PatchPolicy
  # Quick Setup - Config Recording
  SSMQuickSetupForConfigRecording:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            RecordAllResources: 'true'
            RecordGlobalResourceTypes: 'true'
            GlobalResourceTypesRegion: !Ref AWS::Region
            UseCustomBucket: 'false'
            NotificationOptions: NoStreaming
            RemediationSchedule: rate(30 days)
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-CFGRecording
      Description: !Sub Config Recording created by ${LogicalName}
      Name: ConfigRecording
  # Quick Setup - Conformance Packs
  SSMQuickSetupForConformancePacks:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            DelegatedAccountId: !Ref AdminAccountId
            CPackNames: Operational-Best-Practices-for-Amazon-S3
            RemediationSchedule: rate(30 days)
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-CFGCPacks
      Description: !Sub Conformance Packs created by ${LogicalName}
      Name: ConformancePacks
  # Quick Setup - DevOps Guru
  SSMQuickSetupForDevOpsGuru:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            AnalyseAllResources: 'true'
            EnableSnsNotifications: 'true'
            EnableSsmOpsItems: 'true'
            EnableDriftRemediation: 'true'
            RemediationSchedule: rate(30 days)
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-DevOpsGuru
      Description: !Sub DevOps Guru created by ${LogicalName}
      Name: DevOpsGuru
  # Quick Setup - OpsCenter
  SSMQuickSetupForOpsCenter:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            DelegatedAccountId: !Ref AdminAccountId
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-SSMOpsCenter
      Description: !Sub OpsCenter created by ${LogicalName}
      Name: OpsCenter
  # Quick Setup - Change Manager
  SSMQuickSetupForChangeManager:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            DelegatedAccountId: !Ref AdminAccountId
            JobFunction: Admin
            PermissionType: AdminPermissions
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-SSMChangeMgr
      Description: !Sub Change Manager created by ${LogicalName}
      Name: ChangeManager
  # Quick Setup - Resource Scheduler
  SSMQuickSetupForResourceScheduler:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            TargetTagKey: ScheduleEnabled
            TargetTagValue: 'true'
            ICalendarString: !Sub |
              BEGIN:VCALENDAR
              BEGIN:VEVENT
              DTSTART:20240101T220000Z
              DTEND:20240102T080000Z
              RRULE:FREQ=DAILY
              SUMMARY:StopInstances
              END:VEVENT
              END:VCALENDAR
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-Scheduler
      Description: !Sub Resource Scheduler created by ${LogicalName}
      Name: ResourceScheduler
  # Quick Setup - Resource Explorer
  SSMQuickSetupForResourceExplorer:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            SelectedAggregatorRegion: !Ref AWS::Region
            ReplaceExistingAggregator: 'true'
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-ResourceExplorer
      Description: !Sub Resource Explorer created by ${LogicalName}
      Name: ResourceExplorer
  # Quick Setup - Default Host Management Configuration
  SSMQuickSetupForDHMC:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            UpdateSSMAgent: 'true'
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-DHMC
      Description: !Sub DHMC created by ${LogicalName}
      Name: DHMC
  # Quick Setup - Distributor
  SSMQuickSetupForDistributor:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            PackagesToInstall: AWSCWAgent,AWSEC2LaunchAgent
            RemediationSchedule: rate(30 days)
            IsPolicyAttachAllowed: 'true'
            TargetType: '*'
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-Distributor
      Description: !Sub Distributor created by ${LogicalName}
      Name: Distributor
  # Quick Setup - Host Management
  SSMQuickSetupForHostManagement:
    Condition: CreateResourceDataSync
    Type: AWS::SSMQuickSetup::ConfigurationManager
    Properties:
      ConfigurationDefinitions:
        - Parameters:
            UpdateSSMAgent: 'true'
            UpdateEc2LaunchAgent: 'true'
            CollectInventory: 'true'
            ScanInstances: 'true'
            InstallCloudWatchAgent: 'true'
            UpdateCloudWatchAgent: 'true'
            IsPolicyAttachAllowed: 'true'
            TargetType: '*'
            TargetOrganizationalUnits: !Ref OrganizationsRootId
            TargetRegions: !Ref AWS::Region
          Type: AWSQuickSetupType-SSMHostMgmt
      Description: !Sub Host Management created by ${LogicalName}
      Name: HostManagement
  # GUI Connect Preferences (RDP session recording)
  SSMGuiConnectPreferences:
    Condition: CreateResource
    Type: AWS::SSMGuiConnect::Preferences
    Properties:
      ConnectionRecordingPreferences:
        KMSKeyArn: !Sub arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/ssm-gui-connect
        RecordingDestinations:
          S3Buckets:
            - BucketName: !Sub ssm-gui-connect-recordings-${AWS::AccountId}-${AWS::Region}
